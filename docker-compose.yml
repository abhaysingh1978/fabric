services:
  aethon-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VITE_GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - VITE_OPENAI_API_KEY=${OPENAI_API_KEY}
      - VITE_OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ollama_models:
